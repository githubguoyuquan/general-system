services:
  db:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/general_system?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
    # schema 由本机/CI 执行 make db-push（或 compose run app-dev npm run db:push）同步，避免每次重启都 push
    # npm run dev 会执行 predev（prisma generate），同步命名卷 node_modules 与 bind-mount 的 prisma/schema
    command: npm run dev
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"

volumes:
  node_modules:
